  path: ^1.9.1
  path_provider: ^2.1.5
  flutter_local_notifications: ^22.0.0
  timezone: ^0.11.0
  flutter_timezone: ^5.1.0
  fl_chart: ^1.2.0
  lottie: ^3.3.3
  flutter_animate: ^4.5.2
  share_plus: ^11.0.0
