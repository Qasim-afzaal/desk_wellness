name: desk_wellness
description: Affirmation — daily affirmations for a positive mindset.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  get_it: ^8.0.3
  go_router: ^17.3.0
  google_fonts: ^8.1.0
