  home_widget: ^0.7.0
  watch_connectivity: ^0.2.9
  http: ^1.4.0
  cached_network_image: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.22.1
  build_runner: ^2.4.15
